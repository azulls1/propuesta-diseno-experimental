# =====================================================================
# Docker Swarm stack — Propuesta de Diseño Experimental
# Despliegue: docker stack deploy -c stack.yml propuesta-diseno-experimental
# =====================================================================

services:
  frontend:
    image: propuesta-diseno-experimental-frontend:latest
    networks:
      - iagenteknet
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        delay: 5s
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
      labels:
        # ---- Traefik routing ----
        - "traefik.enable=true"
        - "traefik.docker.network=iagenteknet"

        # Router (websecure → Let's Encrypt)
        - "traefik.http.routers.propuesta-diseno-experimental.rule=Host(`propuesta-diseno-experimental.iagentek.com.mx`)"
        - "traefik.http.routers.propuesta-diseno-experimental.entrypoints=websecure"
        - "traefik.http.routers.propuesta-diseno-experimental.tls=true"
        - "traefik.http.routers.propuesta-diseno-experimental.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.propuesta-diseno-experimental.service=propuesta-diseno-experimental"

        # Service backend port
        - "traefik.http.services.propuesta-diseno-experimental.loadbalancer.server.port=80"

networks:
  iagenteknet:
    external: true
