# =====================================================================
# Nginx — Angular SPA con fallback a index.html
# Traefik termina el TLS, aquí servimos HTTP plano
# =====================================================================

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Logs en stdout para que Docker los capture
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    # Gzip — Traefik también puede hacerlo, pero no estorba aquí
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml
        font/woff2;

    # Assets versionados (hashes) → cache largo, inmutable
    location ~* \.(?:js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — Angular maneja las rutas en cliente
    location / {
        try_files $uri $uri/ /index.html;
    }

    # No cachear index.html
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires 0;
    }

    # Health endpoint
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Cabeceras de seguridad básicas
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
